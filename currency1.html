<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Codes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #currency-list {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }
        #currency-list th, #currency-list td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        #currency-list th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h1>Currency Codes and Names</h1>
    <button onclick="fetchCurrencyData()">Load Currency Data</button>
    
    <table id="currency-list" style="display:none;">
        <thead>
            <tr>
                <th>Currency Code</th>
                <th>Currency Name</th>
            </tr>
        </thead>
        <tbody id="currency-table-body"></tbody>
    </table>

    <script>
        async function fetchCurrencyData() {
            try {
                // Request data from PHP within the same page
                const response = await fetch("/currency1.php?fetch=1");
                const data = await response.json();

                if (data.success && data.currencies) {
                    const currencies = data.currencies;
                    const tableBody = document.getElementById("currency-table-body");
                    tableBody.innerHTML = "";  // Clear previous data to avoid duplication

                    // Populate table with the fetched data
                    currencies.forEach(currency => {
                        const row = document.createElement("tr");
                        const codeCell = document.createElement("td");
                        const nameCell = document.createElement("td");

                        codeCell.textContent = currency.code;
                        nameCell.textContent = currency.name;

                        row.appendChild(codeCell);
                        row.appendChild(nameCell);
                        tableBody.appendChild(row);
                    });

                    document.getElementById("currency-list").style.display = "table";
                } else {
                    alert("Failed to load currency data.");
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Error fetching data: " + error);
            }
        }
    </script>

    
</body>
</html>
